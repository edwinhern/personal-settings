# packages.yaml
# Single source of truth for all package manager declarations.
# Referenced by run_onchange_ scripts via Chezmoi template data (.packages.*).
#
# Each group under darwin.homebrew has the same shape: {formulas, casks, mas}.
# `shared` always applies; `personal` or `work` is added based on host context.

packages:
  darwin:
    homebrew:
      shared:
        taps: []
        formulas:
          - dockutil
          - fastfetch
          - gh
          - git-delta
          - mise
          - starship
          - tmux
          - ripgrep
          - neovim
        casks:
          # fonts
          - font-monaspace
          - font-jetbrains-mono-nerd-font
          # apps
          - brave-browser
          - ghostty
          - raycast
          - rectangle
          - superwhisper
          - visual-studio-code
        mas: []

      personal:
        taps:
          - anomalyco/tap # For Opencode
        formulas:
          - mas
          - anomalyco/tap/opencode
        casks:
          - aldente
          - claude-code
          - cleanshot
          - discord
          - displaylink
          - microsoft-excel
          - synology-drive
        mas:
          - name: Klack
            id: 6446206067

      work:
        taps: []
        formulas: []
        casks: []
        mas: []

format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$nodejs\
$package\
$mise\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[directory]
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[nodejs]
symbol = ' '

[package]
symbol = '󰏗 '

[cmd_duration]
min_time = 500
format = '[$duration]($style)'
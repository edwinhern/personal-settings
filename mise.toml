[tools]
"github:microsoft/apm" = "0.13.0"
bats = "1.13.0"
chezmoi = "2.70.3"
prettier = "3.8.3"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"

[tasks.diff]
description = "Preview chezmoi changes from this source tree"
run = 'mise exec -- chezmoi diff --source="$PWD"'

[tasks.update]
description = "Apply this source tree with chezmoi"
run = 'mise exec -- chezmoi apply --verbose --source="$PWD"'

[tasks.reset]
description = "Clear chezmoi script state"
run = "mise exec -- chezmoi state delete-bucket --bucket=scriptState"

[tasks.reset-config]
description = "Re-run chezmoi init data prompts for this source tree"
run = 'mise exec -- chezmoi init --data=false --source="$PWD"'

[tasks.format]
description = "Format shell, markdown, YAML, and TOML"
run = '''
#!/usr/bin/env bash
set -euo pipefail

shell_roots=()
has_shell_roots=0
for root in scripts home/dot_config/zsh home/.chezmoitemplates .github/actions; do
  if [[ -d "${root}" ]]; then
    shell_roots+=("${root}")
    has_shell_roots=1
  fi
done

if ((has_shell_roots)); then
  shell_targets=()
  while IFS= read -r shell_target; do
    shell_targets+=("${shell_target}")
  done < <(find "${shell_roots[@]}" -type f \( -name '*.sh' -o -name '*.zsh' -o -name '.zshrc' \))

  if [[ -n "${shell_targets[*]:-}" ]]; then
    mise exec -- shfmt --write "${shell_targets[@]}"
  fi
fi

mise exec -- prettier --write .
mise exec -- taplo fmt
'''

[tasks.lint]
description = "Lint shell, markdown, YAML, and TOML"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mise exec -- prettier --check .

shell_roots=()
has_shell_roots=0
for root in scripts home/dot_config/zsh home/.chezmoitemplates .github/actions; do
  if [[ -d "${root}" ]]; then
    shell_roots+=("${root}")
    has_shell_roots=1
  fi
done

if ((has_shell_roots)); then
  shell_targets=()
  while IFS= read -r shell_target; do
    shell_targets+=("${shell_target}")
  done < <(find "${shell_roots[@]}" -type f \( -name '*.sh' -o -name '*.zsh' -o -name '.zshrc' \))

  if [[ -n "${shell_targets[*]:-}" ]]; then
    mise exec -- shellcheck "${shell_targets[@]}"
    mise exec -- shfmt --diff "${shell_targets[@]}"
  fi
fi

mise exec -- taplo fmt --check
'''

[tasks.test-unit]
description = "Run bats unit tests"
run = "mise exec -- bats --recursive tests/unit"

[tasks.test-template]
description = "Run bats template tests"
run = "mise exec -- bats --recursive tests/template"

[tasks.test]
description = "Run all bats tests"
run = [{ task = "test-unit" }, { task = "test-template" }]

[tasks.check]
description = "Run lint and tests"
run = [{ task = "lint" }, { task = "test" }]

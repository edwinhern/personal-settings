name: Task
description: Track a feature, enhancement, cleanup, or research item
title: ""
labels: [enhancement]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included, and what is intentionally out of scope?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - APM
        - Chezmoi
        - CI
        - Docs
        - Agents
        - Editor
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this task for the repo right now?
      options:
        - High
        - Normal
        - Low
    validations:
      required: true
  - type: textarea
    id: acceptance-checks
    attributes:
      label: Acceptance Checks
      description: List the checks that prove this task is complete.
      placeholder: "- [ ] mise lint passes"
    validations:
      required: true
  - type: textarea
    id: superpowers-docs
    attributes:
      label: Superpowers Docs
      description: Link the spec or plan under docs/superpowers/ before implementation starts.
      placeholder: "Spec: docs/superpowers/specs/YYYY-MM-DD-topic-design.md\nPlan: docs/superpowers/plans/YYYY-MM-DD-topic.md"
    validations:
      required: true

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  lint:
    name: Lint shell scripts, markdown, and YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: make lint

  validate_apm:
    name: Validate APM config (dry-run, ${{ matrix.context }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        context: [personal, work]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Install APM
        run: curl -sSL https://aka.ms/apm-unix | sh
      - name: Stub chezmoi config (${{ matrix.context }} context)
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.yaml" <<'EOF'
          data:
            hostname: ci-runner
            personal: ${{ matrix.context == 'personal' }}
            work: ${{ matrix.context == 'work' }}
            git:
              name: CI Bot
              email: ci@example.com
            atlassian_resource_url: "https://example.atlassian.net"
          EOF
      - name: Render apm.yml from template
        run: |
          mkdir -p "$HOME/.apm"
          "$HOME/.local/bin/chezmoi" execute-template < home/dot_apm/apm.yml.tmpl > "$HOME/.apm/apm.yml"
          cp -r home/dot_apm/dot_apm "$HOME/.apm/.apm"
      - name: Dry-run apm install
        run: |
          cd "$HOME/.apm"
          apm install --dry-run --global --target claude

  actions_lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  chezmoi_dry_run:
    name: Chezmoi Test (dry-run, ${{ matrix.context }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        context: [personal, work]
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Stub chezmoi config (${{ matrix.context }} context)
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.yaml" <<'EOF'
          data:
            hostname: ci-runner
            personal: ${{ matrix.context == 'personal' }}
            work: ${{ matrix.context == 'work' }}
            git:
              name: CI Bot
              email: ci@example.com
            atlassian_resource_url: "https://example.atlassian.net"
          EOF
      - name: Dry-run apply
        run: |
          "$HOME/.local/bin/chezmoi" apply \
            --source "$PWD" \
            -n \
            -v

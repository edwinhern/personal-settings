name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  lint:
    name: Lint shell scripts, markdown, and YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: make lint

  validate_apm:
    name: Validate APM packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: make compile

  actions_lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  chezmoi_dry_run:
    name: chezmoi apply (dry-run)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Stub chezmoi config (bypasses .chezmoi.yaml.tmpl prompts)
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.yaml" <<'EOF'
          data:
            hostname: ci-runner
            personal: true
            work: false
            osid: darwin
            git:
              name: CI Bot
              email: ci@example.com
          EOF
      - name: Validate .chezmoi.yaml.tmpl renders
        run: |
          "$HOME/.local/bin/chezmoi" execute-template \
            --source "$PWD" \
            < home/.chezmoi.yaml.tmpl > /dev/null
      - name: Dry-run apply
        run: |
          "$HOME/.local/bin/chezmoi" apply \
            --source "$PWD" \
            --dry-run \
            --verbose

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * 5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint shell scripts, markdown, and YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise lint

  validate_apm:
    name: Validate APM config (${{ matrix.context }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        context: [personal, work]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Stub chezmoi config (${{ matrix.context }} context)
        uses: ./.github/actions/write-chezmoi-config
        with:
          context: ${{ matrix.context }}
      - name: Render apm.yml from template
        run: |
          mkdir -p "$HOME/.apm"
          mise exec -- chezmoi execute-template < home/dot_apm/apm.yml.tmpl > "$HOME/.apm/apm.yml"
          cp home/dot_apm/apm.lock.yaml "$HOME/.apm/apm.lock.yaml"
          cp -r home/dot_apm/dot_apm "$HOME/.apm/.apm"
      - name: Dry-run apm install
        run: mise exec -- apm install --dry-run --global
      - name: Audit APM project
        run: |
          apm_project="$(mktemp -d)"
          cp "$HOME/.apm/apm.yml" "$apm_project/apm.yml"
          cp "$HOME/.apm/apm.lock.yaml" "$apm_project/apm.lock.yaml"
          cp -r "$HOME/.apm/.apm" "$apm_project/.apm"
          mise exec -- sh -c "cd \"${apm_project}\" && apm install && apm audit --ci --no-drift --no-policy"

  actions_lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  chezmoi_dry_run:
    name: Chezmoi Test (dry-run, ${{ matrix.context }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        context: [personal, work]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Stub chezmoi config (${{ matrix.context }} context)
        uses: ./.github/actions/write-chezmoi-config
        with:
          context: ${{ matrix.context }}
      - name: Dry-run apply
        run: |
          mise exec -- chezmoi apply \
            --source "$PWD" \
            -n \
            -v

  test:
    name: Run bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise test

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  lint:
    name: Lint shell scripts, markdown, and YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: asdf-vm/actions/install@v4
      - run: make lint

  validate_apm:
    name: Validate APM packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ASDF
        uses: asdf-vm/actions/setup@v4
      - name: Add custom plugins
        run: sh scripts/setup-plugins.sh
      - name: Install tools
        run: asdf install
      - run: make compile

  actions_lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

name: Setup ASDF with custom plugins
description: Installs ASDF, adds custom plugins from .plugin-versions, and installs tools

runs:
  using: composite
  steps:
    - name: Install ASDF
      uses: asdf-vm/actions/setup@v4
    
    - name: Add custom plugins
      shell: sh
      run: sh scripts/setup-plugins.sh
    
    - name: Install tools
      shell: sh
      run: asdf install
